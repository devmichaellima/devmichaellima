<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Banner profissional de Michael Moraes de Lima</title>
  <desc id="desc">Banner escuro com formas abstratas de dados, conexões e arquitetura, apresentando Michael Moraes de Lima e a frase negócios, dados, engenharia de software, automação e IA.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="0.54" stop-color="#111827"/>
      <stop offset="1" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="line" x1="150" y1="270" x2="1120" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.55" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.25 0 0 0 0 0.55 0 0 0 0 1 0 0 0 0.35 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
  </defs>

  <rect width="1280" height="360" rx="24" fill="url(#bg)"/>
  <path d="M0 310C148 258 248 290 390 238C542 182 616 92 760 100C894 107 973 198 1280 102V360H0V310Z" fill="#0F172A" opacity="0.62"/>
  <path d="M126 250C230 210 314 236 418 178C518 122 612 74 752 116C884 156 950 210 1128 126" stroke="url(#line)" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <path d="M158 286C286 230 388 274 510 214C622 159 724 150 838 188C962 230 1056 206 1166 156" stroke="#38BDF8" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>

  <g filter="url(#softGlow)">
    <circle cx="126" cy="250" r="7" fill="#38BDF8"/>
    <circle cx="418" cy="178" r="7" fill="#60A5FA"/>
    <circle cx="752" cy="116" r="7" fill="#A78BFA"/>
    <circle cx="1128" cy="126" r="7" fill="#38BDF8"/>
  </g>

  <g opacity="0.42">
    <rect x="910" y="58" width="116" height="52" rx="10" stroke="#93C5FD"/>
    <rect x="1048" y="82" width="112" height="52" rx="10" stroke="#C4B5FD"/>
    <rect x="982" y="168" width="126" height="52" rx="10" stroke="#60A5FA"/>
    <path d="M1026 84H1048M968 110V168M1048 134L1018 168" stroke="#93C5FD" stroke-width="2"/>
    <circle cx="1026" cy="84" r="4" fill="#93C5FD"/>
    <circle cx="968" cy="110" r="4" fill="#93C5FD"/>
    <circle cx="1048" cy="134" r="4" fill="#C4B5FD"/>
  </g>

  <g opacity="0.28">
    <path d="M76 76H238M76 106H188M76 136H266" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round"/>
    <path d="M76 176H222M76 206H166M76 236H250" stroke="#60A5FA" stroke-width="2" stroke-linecap="round"/>
  </g>

  <text x="92" y="142" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="48" font-weight="700">Michael Moraes de Lima</text>
  <text x="94" y="188" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="500">Negócios • Dados • Engenharia de Software • Automação • IA</text>
  <text x="94" y="230" fill="#93C5FD" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20">Transformando processos, dados e ideias em soluções.</text>
</svg>
